name: Release

on:
  # Temporarily disabled — re-enable by uncommenting the tag trigger below.
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-os-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl toolchain and kernel build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential bc flex bison \
            libelf-dev libssl-dev wget xz-utils

      - name: Build dome-guest
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build -p dome-guest --target aarch64-unknown-linux-musl --release

      - name: Build OS image
        run: ./scripts/prepare-rootfs.sh

      - name: Package OS image
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DATA_DIR="${HOME}/.local/share/dome"
          tar czf "dome-os-${VERSION}-aarch64.tar.gz" \
            -C "${DATA_DIR}" \
            Image initramfs.cpio.gz rootfs.ext4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image
          path: dome-os-*.tar.gz
          retention-days: 1

  build-cli-darwin:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build -p dome-cli --release

      - name: Codesign
        run: codesign --entitlements dome.entitlements --force -s - target/release/dome

      - name: Package CLI binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar czf "dome-${VERSION}-darwin-aarch64.tar.gz" \
            -C target/release \
            dome

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binary-darwin
          path: dome-*.tar.gz
          retention-days: 1

  build-cli-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build -p dome-cli --release

      - name: Package CLI binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar czf "dome-${VERSION}-linux-aarch64.tar.gz" \
            -C target/release \
            dome

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binary-linux
          path: dome-*.tar.gz
          retention-days: 1

  release:
    needs: [build-os-image, build-cli-darwin, build-cli-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: os-image
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: cli-binary-darwin
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: cli-binary-linux
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mhjmaas/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-binary-darwin
          path: /tmp/artifact

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum /tmp/artifact/dome-${GITHUB_REF_NAME}-darwin-aarch64.tar.gz | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/dome.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/dome.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dome.rb
          git diff --cached --quiet && exit 0
          git commit -m "bump dome to ${GITHUB_REF_NAME}"
          git push

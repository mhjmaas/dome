name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-unit:
    name: SDK unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: packages/sdk
      - run: bun test test/unit/
        working-directory: packages/sdk

  sdk-lint:
    name: SDK lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: packages/sdk
      - run: bunx --bun @biomejs/biome check src/
        working-directory: packages/sdk

  rust-check:
    name: Rust check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p dome-cli
      # Run the hypervisor-free unit + control-protocol tests. Plain `cargo test`
      # targets the workspace's default-members (the macOS-buildable crates;
      # dome-darwin/dome-linux are platform-specific and excluded), and skips the
      # `#[ignore]`d integration tests that need a real hypervisor + codesigned binary.
      - run: cargo test

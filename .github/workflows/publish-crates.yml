name: Publish Crates

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish-darwin:
    name: Publish macOS crates
    if: ${{ false }} # Temporarily disabled — remove this line to re-enable (downstream jobs depend on this one).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish dome-proto and dome-darwin
        run: |
          publish() {
            local crate=$1
            shift
            if output=$(cargo publish -p "$crate" "$@" 2>&1); then
              echo "Published $crate"
              echo "Waiting for crates.io to index..."
              sleep 30
            elif echo "$output" | grep -q "already exists"; then
              echo "$crate already published, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }

          publish dome-proto
          publish dome-darwin

  publish-linux:
    name: Publish Linux crate
    needs: publish-darwin
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish dome-linux
        run: |
          publish() {
            local crate=$1
            shift
            if output=$(cargo publish -p "$crate" "$@" 2>&1); then
              echo "Published $crate"
              echo "Waiting for crates.io to index..."
              sleep 30
            elif echo "$output" | grep -q "already exists"; then
              echo "$crate already published, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }

          publish dome-linux

  publish-cross:
    name: Publish cross-platform crates
    needs: publish-linux
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish dome-proxy, dome-store, dome-vm, dome-sdk
        run: |
          publish() {
            local crate=$1
            shift
            if output=$(cargo publish -p "$crate" "$@" 2>&1); then
              echo "Published $crate"
              echo "Waiting for crates.io to index..."
              sleep 30
            elif echo "$output" | grep -q "already exists"; then
              echo "$crate already published, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }

          publish dome-proxy
          publish dome-store
          publish dome-vm
          publish dome-sdk
